<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Retirement Simulator – SORR</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- App styles -->
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="wrap">
<h1>Retirement cashflow simulator</h1>

<!-- Top sliders grid - 2 rows, 3 columns -->
<div class="grid-2x3">
  <div class="slider-item">
    <label>Retirement age: <span id="ageValue" class="value-display">37</span></label>
    <input type="range" id="currentAgeSlider" min="25" max="60" value="37" step="1">
  </div>
  <div class="slider-item">
    <label>Life Expectancy (year): <span id="endAgeValue" class="value-display">85</span></label>
    <input type="range" id="endAgeSlider" min="80" max="100" value="85" step="1">
  </div>
  <div class="slider-item empty"></div>
  <div class="slider-item">
    <label>Initial corpus (₹): <span id="corpusValue" class="value-display">3,50,00,000</span></label>
    <input type="range" id="corpusSlider" min="10000000" max="100000000" value="35000000" step="500000">
    <div id="corpusWords" class="hint"></div>
  </div>
  <div class="slider-item">
    <label>Initial monthly withdrawal (₹): <span id="monthlyValue" class="value-display">75,000</span></label>
    <input type="range" id="monthlySlider" min="50000" max="200000" value="75000" step="1000">
    <div id="monthlyWords" class="hint"></div>
  </div>
  <div class="slider-item">
    <label>Increase withdrawal each year (%): <span id="stepupValue" class="value-display">6</span></label>
    <input type="range" id="stepupSlider" min="3" max="8" value="6" step="0.1">
  </div>
</div>

<hr class="divider">

<div class="tabContainer">
<div class="tabHeader">
<div class="tabBtn active" data-tab="staticTab">Static Analysis</div>
<div class="tabBtn" data-tab="dynamicTab">Sequence of Returns Risk Analysis</div>
</div>

<div class="tabBody">

<!-- STATIC TAB -->
<div id="staticTab" class="tabContent active">
<div class="grid">
<div class="slider-item">
<label>Estimated annual return (%): <span id="retValue" class="value-display">7</span></label>
<input type="range" id="retSlider" min="5" max="12" value="7" step="0.1">
</div>
</div>

<div id="staticSummary" class="muted"></div>
<canvas id="staticChart" height="150"></canvas>
<div id="tableWrap"></div>
</div>

<!-- DYNAMIC TAB -->
<div id="dynamicTab" class="tabContent">

<!-- Radio buttons for market selection -->
<table style="border-collapse: collapse; width:100%; margin-bottom:10px;">
<tr>
<td style="vertical-align:top; padding-right:10px; color:var(--muted); font-size:13px; width:1%; white-space:nowrap;">Investment Approach:</td>
<td style="vertical-align:top;">
  <div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
    <label><input type="radio" name="marketSource" value="nifty50" checked onchange="updateMarket()"> 100% Equity - Nifty 50</label>
    <label><input type="radio" name="marketSource" value="sp500100" disabled> 100% Equity - S&P 500 (Upcoming)</label>
    <label><input type="radio" name="marketSource" value="blended65" disabled> Blended Fixed: 65% Equity, 35% Debt (Upcoming)</label>
    <label><input type="radio" name="marketSource" value="blended50" disabled> Blended Fixed: 50% Equity, 50% Debt (Upcoming)</label>
    <label><input type="radio" name="marketSource" value="gliding" disabled> Blended Gliding Down Portfolio (Upcoming)</label>
  </div>
</td>
</tr>
</table>

<!-- Slider for number of simulations -->
<div class="sliderContainer">
<label>Number of sequences to simulate (max <span id="maxSequences">10,000</span>):</label>
<input type="range" id="simCountSlider" min="1" max="10000" value="4000">
<span id="simCountValue">1</span>
</div>

<!-- Run button and status inline -->
<div class="buttonContainer">
<button id="runMc">Run simulations</button>
<span id="niftyStatus" class="muted"></span>
</div>

<!-- MC Results Tables Container - 1 row, 2 columns with invisible borders -->
<table id="mcOuterContainer" style="display:none; border-collapse:collapse; width:auto; margin:20px auto; border:none;">
  <tr>
    <!-- Left cell: Success Statistics Table -->
    <td style="border:none; padding:0 50px 0 0; vertical-align:top;">
      <table id="mcResultsTable">
        <tbody>
          <tr>
            <td>Total runs</td>
            <td id="mcTotal">0</td>
          </tr>
          <tr>
            <td>Passed</td>
            <td id="mcPassed">0</td>
          </tr>
          <tr>
            <td>Failed</td>
            <td id="mcFailed">0</td>
          </tr>
          <tr>
            <td>Success rate</td>
            <td id="mcRate">0%</td>
          </tr>
        </tbody>
      </table>
    </td>

    <!-- Right cell: Percentile Table -->
    <td style="border:none; padding:0; vertical-align:top;">
      <table id="mcPercentilesTable">
        <thead>
          <tr>
            <th># simulations</th>
            <th>Min Corpus Left</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>80%</td>
            <td id="p80">₹ 0</td>
          </tr>
          <tr>
            <td>90%</td>
            <td id="p90">₹ 0</td>
          </tr>
          <tr>
            <td>95%</td>
            <td id="p95">₹ 0</td>
          </tr>
        </tbody>
      </table>
    </td>
  </tr>
</table>

<canvas id="mcChart" height="220" style="display:none"></canvas>

<!-- Samples slider (below chart) – hidden by default -->
<div class="samplesContainer">
<label for="samplesSlider">Samples on chart:</label>
<input type="range" id="samplesSlider" min="100" max="300" value="100" step="10">
<span id="samplesValue">100</span>
</div>

<!-- Sample button placed below chart -->
<div style="margin:10px 0; text-align:center;">
<button id="sampleFailBtn" style="background:#6b7280; display:none;">Show a sample failing sequence</button>
</div>

<!-- Container for sample failing sequence table -->
<div id="sampleTableContainer"></div>

<div class="loaderOverlay" id="mcLoader">
<div class="spinner"></div>
<div class="muted">Running simulations...</div>
</div>
</div>

</div>
</div>
</div>

<!-- Application modules -->
<script type="module" src="js/main.js"></script>
</body>
</html>
