<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Retirement Simulator – SORR</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--accent:#2b7cff;--muted:#6b7280;--deplete:#ffe5e5}
html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f7fafc 0,#fff 100%);color:#0b1220}
.wrap{max-width:1000px;margin:28px auto;padding:20px;border-radius:12px;background:white;box-shadow:0 6px 30px rgba(7,10,25,0.08)}
h1{margin:0 0 18px;font-size:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input[type=range]{width:100%;max-width:220px;margin:5px 0}
.value-display{font-weight:600;color:var(--accent);font-size:14px;margin-left:5px}
.hint{font-size:13px;color:#9ca3af;margin-top:6px; line-height:1.4;}
.divider{border:none;border-top:1px solid #e5e7eb;margin:20px 0}
.tabContainer{border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;position:relative}
.tabHeader{display:flex;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.tabHeader div{padding:10px 18px;cursor:pointer;font-size:14px}
.tabHeader .active{background:white;font-weight:600;border-bottom:2px solid var(--accent)}
.tabBody{padding:18px;background:white;position:relative}
.tabContent{display:none}
.tabContent.active{display:block}
canvas{margin:20px 0}
table{width:100%;border-collapse:collapse;margin-top:14px}
th,td{padding:8px 10px;border:1px solid #eef2ff;text-align:right}
th{background:#f6f9ff;font-weight:600}
td.age,th.age{text-align:center}
.depleted td{background:var(--deplete)}
.muted{color:#6b7280;font-size:13px}
button{background:var(--accent);color:#fff;padding:8px 14px;border-radius:8px;border:0;cursor:pointer}
button:disabled{opacity:.6;cursor:not-allowed}
.loaderOverlay{position:absolute;inset:0;background:rgba(255,255,255,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;display:none}
.spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
#mcResultsTable { font-size:13px; width:auto; margin-left:auto; margin-right:auto; border-collapse:collapse; background:white; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
#mcResultsTable th, #mcResultsTable td { padding:6px 12px; text-align:center; border:1px solid #eef2ff; }
#mcResultsTable th { background:#f6f9ff; font-weight:600; }
#mcResultsTable td { font-weight:500; }
.sliderContainer { display:flex; align-items:center; gap:15px; margin:15px 0; flex-wrap:wrap; }
.sliderContainer label { font-size:13px; color:var(--muted); }
#simCountSlider { width:300px; }
#simCountValue { font-weight:600; color:var(--accent); min-width:50px; display:inline-block; }
.buttonContainer { display:flex; align-items:center; gap:20px; margin:15px 0; flex-wrap:wrap; }
#sampleTableContainer { margin-top:20px; overflow-x:auto; }
#sampleTable { width:100%; border-collapse:collapse; font-size:12px; }
#sampleTable th { background:#f0f4ff; font-weight:600; padding:8px 4px; text-align:center; border:1px solid #d0d9ff; }
#sampleTable td { padding:6px 4px; text-align:right; border:1px solid #e0e6ff; }
#sampleTable td:first-child { text-align:center; }
.radioGroup { display:flex; gap:20px; align-items:center; flex-wrap:wrap; margin:10px 0; }
.radioGroup label { font-size:13px; color:var(--muted); display:inline-flex; align-items:center; gap:4px; }
.slider-item { display:flex; flex-direction:column; }
#staticSummary {
    text-align: right;
    font-size: 14px;
    margin-bottom: 2px;
}
/* Samples slider (below chart) – hidden by default, shown after first MC run */
.samplesContainer {
    display: none;  /* hidden until simulation runs */
    align-items: center;
    justify-content: flex-end;
    gap: 15px;
    margin-top: 10px;
    margin-bottom: 5px;
}
.samplesContainer label {
    font-size: 13px;
    color: var(--muted);
}
#samplesSlider {
    width: 200px;
}
#samplesValue {
    font-weight: 600;
    color: var(--accent);
    min-width: 40px;
    display: inline-block;
    text-align: right;
}
/* Negative numbers red */
.negative { color: #dc2626; }
/* Depleted row background */
.depleted-row { background-color: #ffe5e5; }
#tableWrap table {
    font-size: 12px;
}
#tableWrap th,
#tableWrap td {
    padding: 6px 12px;
}
</style>
</head>
<body>
<div class="wrap">
<h1>Retirement cashflow simulator</h1>

<!-- Top sliders grid -->
<div class="grid">
  <div class="slider-item">
    <label>Initial corpus (₹): <span id="corpusValue" class="value-display">3,50,00,000</span></label>
    <input type="range" id="corpusSlider" min="10000000" max="100000000" value="35000000" step="500000">
    <div id="corpusWords" class="hint"></div>
  </div>
  <div class="slider-item">
    <label>Retirement age: <span id="ageValue" class="value-display">37</span></label>
    <input type="range" id="currentAgeSlider" min="25" max="60" value="37" step="1">
  </div>
  <div class="slider-item">
    <label>Initial monthly withdrawal (₹): <span id="monthlyValue" class="value-display">75,000</span></label>
    <input type="range" id="monthlySlider" min="50000" max="200000" value="75000" step="1000">
    <div id="monthlyWords" class="hint"></div>
  </div>
  <div class="slider-item">
    <label>Increase withdrawal each year (%): <span id="stepupValue" class="value-display">6</span></label>
    <input type="range" id="stepupSlider" min="3" max="8" value="6" step="0.1">
  </div>
</div>

<hr class="divider">

<div class="tabContainer">
<div class="tabHeader">
<div class="tabBtn active" data-tab="staticTab">Static Analysis</div>
<div class="tabBtn" data-tab="dynamicTab">Sequence of Returns Risk Analysis</div>
</div>

<div class="tabBody">

<!-- STATIC TAB -->
<div id="staticTab" class="tabContent active">
<div class="grid">
<div class="slider-item">
<label>Estimated annual return (%): <span id="retValue" class="value-display">7</span></label>
<input type="range" id="retSlider" min="5" max="12" value="7" step="0.1">
</div>
<!-- removed stop at zero checkbox -->
</div>

<div id="staticSummary" class="muted"></div>
<canvas id="staticChart" height="150"></canvas>
<div id="tableWrap"></div>
</div>

<!-- DYNAMIC TAB -->
<div id="dynamicTab" class="tabContent">

<!-- Radio buttons for market selection -->
<div class="radioGroup">
<span style="color:var(--muted); font-size:13px;">Market:</span>
<label><input type="radio" name="marketSource" value="nifty" checked onchange="updateMarket()"> Nifty 50 (2000–2022)</label>
<label><input type="radio" name="marketSource" value="sp500" disabled> S&P 500 (Coming soon...)</label>
</div>

<!-- Slider for number of simulations -->
<div class="sliderContainer">
<label>Number of sequences to simulate (max <span id="maxSequences">0</span>):</label>
<input type="range" id="simCountSlider" min="1" max="1" value="1">
<span id="simCountValue">1</span>
</div>

<!-- Run button and status inline -->
<div class="buttonContainer">
<button id="runMc">Run simulations</button>
<span id="niftyStatus" class="muted"></span>
</div>

<!-- Monte Carlo results table -->
<table id="mcResultsTable" style="margin-top:15px; margin-bottom:10px; display:none">
<thead>
<tr>
<th>Total runs</th>
<th>Passed</th>
<th>Failed</th>
<th>Success rate</th>
</tr>
</thead>
<tbody>
<tr>
<td id="mcTotal">0</td>
<td id="mcPassed">0</td>
<td id="mcFailed">0</td>
<td id="mcRate">0%</td>
</tr>
</tbody>
</table>

<canvas id="mcChart" height="220" style="display:none"></canvas>

<!-- Samples slider (below chart) – hidden by default -->
<div class="samplesContainer">
<label for="samplesSlider">Samples on chart:</label>
<input type="range" id="samplesSlider" min="100" max="300" value="100" step="10">
<span id="samplesValue">100</span>
</div>

<!-- Sample button placed below chart -->
<div style="margin:10px 0; text-align:center;">
<button id="sampleFailBtn" style="background:#6b7280; display:none;">Show a sample failing sequence</button>
</div>

<!-- Container for sample failing sequence table -->
<div id="sampleTableContainer"></div>

<div class="loaderOverlay" id="mcLoader">
<div class="spinner"></div>
<div class="muted">Running simulations...</div>
</div>
</div>

</div>
</div>
</div>

<script>
// ==================== GLOBAL VARIABLES ====================
let niftyReturns = []; // array of { startDate, endDate, ret }
let niftyDataLoaded = false;
let niftyLoadError = false;

let lastSimPaths = []; // array of objects { returnIndices, pathEndCorpus, failedAt }
let lastFailIndices = []; // indices in lastSimPaths that failed
let lastFailShown = new Set();
let lastLabels = [];     // store the age labels from the last simulation

let staticChart = null;  // will hold the static chart instance
let mcChart = null;      // will hold the Monte Carlo chart instance

// ==================== HELPER FUNCTIONS ====================
function parseNumber(str){return parseFloat((str||'').replace(/,/g,''))||0}
function formatIndian(num){return Number.isFinite(num)?num.toLocaleString('en-IN',{maximumFractionDigits:0}):''}
function formatNumber(num) { return num.toLocaleString('en-IN', {maximumFractionDigits: 0}); }

function toIndianWords(num) {
    if (isNaN(num) || num < 0) return '';
    if (num >= 1e7) {
        let val = num / 1e7;
        val = Math.round(val * 100) / 100;
        return val + ' crore';
    } else if (num >= 1e5) {
        let val = num / 1e5;
        val = Math.round(val * 100) / 100;
        return val + ' lakh';
    } else if (num >= 1e3) {
        let val = num / 1e3;
        val = Math.round(val * 100) / 100;
        return val + ' thousand';
    } else {
        return num.toString();
    }
}

// ==================== DATE PARSING ====================
function parseDate(dateStr) {
    dateStr = dateStr.trim();
    const parts = dateStr.split('-');
    if (parts.length !== 3) throw new Error(`Invalid date format: ${dateStr}`);
    const day = parseInt(parts[0], 10);
    if (isNaN(day) || day < 1 || day > 31) throw new Error(`Invalid day: ${parts[0]}`);
    const monthStr = parts[1];
    const yearShort = parseInt(parts[2], 10);
    if (isNaN(yearShort) || yearShort < 0 || yearShort > 99) throw new Error(`Invalid year: ${parts[2]}`);
    const year = 2000 + yearShort;
    const months = {Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11};
    const month = months[monthStr];
    if (month === undefined) throw new Error(`Invalid month abbreviation: ${monthStr}`);
    return new Date(year, month, day);
}

function formatDate(date) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${date.getDate()}-${months[date.getMonth()]}-${date.getFullYear()}`;
}

// ==================== NIFTY DATA PROCESSING ====================
function processNiftyData(csvText) {
    const lines = csvText.trim().split('\n');
    if (lines.length < 2) throw new Error('CSV file is empty');
    
    const data = [];
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === '') continue;
        const cols = line.split(',');
        if (cols.length < 2) continue;
        const dateStr = cols[0].trim();
        const closeStr = cols[1].trim();
        const close = parseFloat(closeStr);
        if (isNaN(close)) continue;
        try {
            const date = parseDate(dateStr);
            data.push({ date, price: close });
        } catch (e) {
            console.warn(`Skipping line ${i+1}: ${e.message}`);
        }
    }
    
    if (data.length < 252) throw new Error(`Insufficient data: need at least 252 valid daily prices, got ${data.length}`);
    
    data.sort((a, b) => a.date - b.date);
    
    const returns = [];
    const msPerDay = 24 * 60 * 60 * 1000;
    for (let i = 0; i < data.length; i++) {
        const targetTime = data[i].date.getTime() + 365 * msPerDay;
        let lo = i + 1, hi = data.length - 1;
        while (lo <= hi) {
            const mid = Math.floor((lo + hi) / 2);
            if (data[mid].date.getTime() < targetTime) {
                lo = mid + 1;
            } else {
                hi = mid - 1;
            }
        }
        if (lo < data.length) {
            const ret = (data[lo].price - data[i].price) / data[i].price;
            returns.push({
                startDate: data[i].date,
                endDate: data[lo].date,
                ret: ret
            });
        }
    }
    
    if (returns.length === 0) throw new Error('No 1-year returns could be computed.');
    return returns;
}

async function loadNiftyData() {
    try {
        const response = await fetch('Nifty_50_with_indicators_.csv');
        if (!response.ok) throw new Error(`HTTP error ${response.status} – make sure the file exists and you're using a local server.`);
        const csvText = await response.text();
        niftyReturns = processNiftyData(csvText);
        niftyDataLoaded = true;
        niftyLoadError = false;
        
        updateNiftyStatus();
        
        const slider = document.getElementById('simCountSlider');
        const maxSims = 10000;
        slider.max = maxSims;
        slider.value = Math.min(2000, maxSims);
        document.getElementById('simCountValue').textContent = slider.value;
        document.getElementById('maxSequences').textContent = maxSims;
        
        console.log(`Loaded ${niftyReturns.length} historical 1-year returns.`);
    } catch (e) {
        console.error('Failed to load/process Nifty CSV:', e);
        niftyDataLoaded = false;
        niftyLoadError = true;
        updateNiftyStatus(e.message);
    }
}

function updateNiftyStatus(errorMsg) {
    const statusSpan = document.getElementById('niftyStatus');
    const runBtn = document.getElementById('runMc');
    
    if (niftyLoadError) {
        statusSpan.innerHTML = `<span class="error">❌ Failed to load data.</span>`;
        runBtn.disabled = true;
    } else if (!niftyDataLoaded) {
        statusSpan.innerHTML = '<span class="muted">⏳ Loading Nifty data...</span>';
        runBtn.disabled = true;
    } else {
        statusSpan.innerHTML = `<span class="success">✅ ${niftyReturns.length} historical 1-year returns</span>`;
        runBtn.disabled = false;
    }
}

function updateMarket() { /* placeholder */ }

loadNiftyData();

// ==================== UPDATE ALL FROM SLIDERS ====================
function updateAll() {
    const corpus = parseFloat(document.getElementById('corpusSlider').value);
    const age = parseInt(document.getElementById('currentAgeSlider').value, 10);
    const monthly = parseFloat(document.getElementById('monthlySlider').value);
    const stepup = parseFloat(document.getElementById('stepupSlider').value);
    const ret = parseFloat(document.getElementById('retSlider').value);

    document.getElementById('corpusValue').textContent = formatNumber(corpus);
    document.getElementById('ageValue').textContent = age;
    document.getElementById('monthlyValue').textContent = formatNumber(monthly);
    document.getElementById('stepupValue').textContent = stepup.toFixed(1);
    document.getElementById('retValue').textContent = ret.toFixed(1);

    const corpusWords = toIndianWords(corpus);
    const annualWithdrawal = monthly * 12;
    const withdrawalPct = corpus > 0 ? ((annualWithdrawal / corpus) * 100).toFixed(1) : '0';
    const ratio = corpus > 0 ? (corpus / annualWithdrawal).toFixed(1) : '0';
    // Put ratio on new line
    document.getElementById('corpusWords').innerHTML = `${corpusWords}<br>(${ratio}x of 1st year withdrawal)`;
    
    const monthlyWords = toIndianWords(monthly);
    document.getElementById('monthlyWords').innerHTML = `${monthlyWords}<br>(${withdrawalPct}% of 1st year corpus)`;

    runStatic();
}

// Attach slider events
document.getElementById('corpusSlider').addEventListener('input', updateAll);
document.getElementById('currentAgeSlider').addEventListener('input', updateAll);
document.getElementById('monthlySlider').addEventListener('input', updateAll);
document.getElementById('stepupSlider').addEventListener('input', updateAll);
document.getElementById('retSlider').addEventListener('input', updateAll);

// ==================== STATIC SIMULATION ====================
function runStatic() {
    const corpus0 = parseFloat(document.getElementById('corpusSlider').value);
    const age0 = parseInt(document.getElementById('currentAgeSlider').value, 10);
    const monthly0 = parseFloat(document.getElementById('monthlySlider').value);
    const step = parseFloat(document.getElementById('stepupSlider').value) / 100 || 0;
    const retPct = parseFloat(document.getElementById('retSlider').value) / 100 || 0;
    // stop when corpus <= 0 (always true now)
    const stop = true;

    let rows = [], start = corpus0, m = monthly0, depleted = null;
    for (let age = age0; age <= 85; age++) {
        if (depleted !== null) { rows.push({ age, depleted: true }); continue; }
        if (age !== age0) m *= (1 + step);
        const annual = m * 12;
        const after = start * (1 + retPct);
        const end = after - annual;
        rows.push({ age, start, after, monthly: m, annual, end });
        if (end <= 0 && stop) depleted = age;
        start = end;
    }

    // New column order: Age, Starting, After growth, Monthly, Annual, Ending
    let html = '<table><thead><tr><th class="age">Age</th><th>Starting Corpus</th><th>Corpus after ' + (retPct*100).toFixed(1) + '% Growth</th><th>Monthly Withdrawal</th><th>Annual Withdrawal</th><th>Ending Corpus</th></tr></thead><tbody>';
    rows.forEach(r => {
        if (r.depleted) {
            html += `<tr class="depleted"><td class="age">${r.age}</td><td></td><td></td><td></td><td></td><td></td></tr>`;
        } else {
            // Format numbers with ₹ and commas
            const startStr = formatIndian(r.start);
            const afterStr = formatIndian(r.after);
            // Monthly and annual displayed as negative (prepend minus) and in red
            const monthlyStr = '- ' + formatIndian(r.monthly);
            const annualStr = '- ' + formatIndian(r.annual);
            const endStr = formatIndian(r.end);
            
            // Determine if each value is negative for red coloring
            const startClass = r.start < 0 ? 'negative' : '';
            const afterClass = r.after < 0 ? 'negative' : '';
            const monthlyClass = 'negative'; // always negative as per user request
            const annualClass = 'negative';
            const endClass = r.end < 0 ? 'negative' : '';
            
            html += `<tr>
                <td class="age">${r.age}</td>
                <td class="${startClass}">₹ ${startStr}</td>
                <td class="${afterClass}">₹ ${afterStr}</td>
                <td class="${monthlyClass}">₹ ${monthlyStr}</td>
                <td class="${annualClass}">₹ ${annualStr}</td>
                <td class="${endClass}">₹ ${endStr}</td>
            </tr>`;
        }
    });
    html += '</tbody></table>';
    document.getElementById('tableWrap').innerHTML = html;

    const summaryDiv = document.getElementById('staticSummary');
    if (depleted !== null) {
        summaryDiv.innerHTML = `<span style='color:#dc2626;font-weight:600'>✖ Failed</span> - Corpus depleted at age ${depleted}`;
    } else {
        summaryDiv.innerHTML = `<span style='color:#16a34a;font-weight:600'>✔ Success</span> - Ending corpus at age 85: <span style='color:#16a34a;'> ₹ ${formatIndian(rows[rows.length-1].end)} </span>`;
    }

    const labels = rows.map(r => r.age);
    const data = rows.map(r => r.depleted ? null : r.end);
    if (staticChart) staticChart.destroy();
    staticChart = new Chart(document.getElementById('staticChart'), {
        type: 'line',
        data: { labels, datasets: [{ data, borderColor: '#2b7cff', tension: 0.3 }] },
        options: {
            plugins: { legend: { display: false } }, // tooltips enabled by default
            scales: { y: { ticks: { callback: v => formatIndian(v) } } }
        }
    });
}

// ==================== BOOTSTRAP SIMULATION ====================
document.getElementById('simCountSlider').addEventListener('input', function(e) {
    document.getElementById('simCountValue').textContent = e.target.value;
});

// Samples slider display (input event updates the number, change triggers redraw)
document.getElementById('samplesSlider').addEventListener('input', function(e) {
    document.getElementById('samplesValue').textContent = e.target.value;
});
document.getElementById('samplesSlider').addEventListener('change', function() {
    if (lastSimPaths.length > 0) {
        redrawChartWithSamples();
    }
});

function redrawChartWithSamples() {
    if (!lastSimPaths.length) {
        console.warn('No simulation data to redraw');
        return;
    }

    const totalDisplayPaths = parseInt(document.getElementById('samplesSlider').value, 10);
    const runs = lastSimPaths.length;
    const successes = lastSimPaths.filter(r => r.failedAt === null).length;

    let successPaths = lastSimPaths.filter(r => r.failedAt === null).map(r => r.pathEndCorpus);
    let failPaths = lastSimPaths.filter(r => r.failedAt !== null).map(r => r.pathEndCorpus);

    let successCount = Math.min(successPaths.length, Math.round(totalDisplayPaths * successes / runs));
    let failCount = Math.min(failPaths.length, totalDisplayPaths - successCount);
    if (successCount + failCount < totalDisplayPaths) {
        successCount = Math.min(successPaths.length, totalDisplayPaths);
        failCount = Math.min(failPaths.length, totalDisplayPaths - successCount);
    }

    function samplePaths(arr, k) {
        if (k >= arr.length) return arr.slice();
        const shuffled = [...arr];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, k);
    }

    const sampledSuccess = samplePaths(successPaths, successCount);
    const sampledFail = samplePaths(failPaths, failCount);

    let datasets = [];
    sampledSuccess.forEach(path => {
        datasets.push({ data: path, borderColor: 'rgba(43,124,255,0.25)', borderWidth: 1.2, pointRadius: 0, tension: 0.2 });
    });
    sampledFail.forEach(path => {
        datasets.push({ data: path, borderColor: 'rgba(220,38,38,0.25)', borderWidth: 1.2, pointRadius: 0, tension: 0.2 });
    });

    // Use stored labels from the simulation
    const labels = lastLabels;

    if (labels.length === 0) {
        console.warn('No labels available');
        return;
    }

    if (mcChart) mcChart.destroy();

    const corpus0 = parseFloat(document.getElementById('corpusSlider').value);
    const maxY = corpus0 * 10;
    const minY = -corpus0 * 10;

    try {
        mcChart = new Chart(document.getElementById('mcChart'), {
            type: 'line',
            data: { labels, datasets },
            options: {
                plugins: { 
                    legend: { display: false },
                    tooltip: { enabled: false } // Disable tooltips for SORR chart
                },
                scales: {
                    y: {
                        min: minY,
                        max: maxY,
                        grid: { color: context => context.tick.value === 0 ? '#ccc' : '#e5e7eb' },
                        ticks: { callback: v => formatIndian(v) }
                    }
                }
            }
        });
        document.getElementById('mcChart').style.display = 'block';
        console.log('Chart redrawn successfully');
    } catch (e) {
        console.error('Error redrawing chart:', e);
    }
}

document.getElementById('runMc').addEventListener('click', () => {
    if (!niftyDataLoaded) {
        alert('Nifty data not loaded yet.');
        return;
    }
    document.getElementById('niftyStatus').style.display = 'none';
    document.getElementById('sampleFailBtn').style.display = 'none';
    document.getElementById('sampleTableContainer').innerHTML = '';

    const runs = parseInt(document.getElementById('simCountSlider').value, 10);
    const corpus0 = parseFloat(document.getElementById('corpusSlider').value);
    const age0 = parseInt(document.getElementById('currentAgeSlider').value, 10);
    const monthly0 = parseFloat(document.getElementById('monthlySlider').value);
    const step = parseFloat(document.getElementById('stepupSlider').value) / 100 || 0;
    const requiredYears = 85 - age0 + 1;

    const runBtn = document.getElementById('runMc');
    runBtn.innerText = 'Running...';
    runBtn.disabled = true;
    document.getElementById('mcLoader').style.display = 'flex';

    setTimeout(() => {
        runBootstrapSimulation(runs, corpus0, age0, monthly0, step, requiredYears);
    }, 50);
});

function runBootstrapSimulation(runs, corpus0, age0, monthly0, step, requiredYears) {
    let successes = 0;
    let simResults = [];

    for (let s = 0; s < runs; s++) {
        let start = corpus0;
        let m = monthly0;
        let failed = false;
        let failedAge = null;
        let path = [];
        let indices = [];

        for (let y = 0; y < requiredYears; y++) {
            const idx = Math.floor(Math.random() * niftyReturns.length);
            indices.push(idx);
            const ret = niftyReturns[idx].ret;
            const afterReturn = start * (1 + ret);
            const withdrawal = m * 12;
            const end = afterReturn - withdrawal;
            path.push(end);
            if (end <= 0 && !failed) {
                failed = true;
                failedAge = age0 + y;
            }
            start = end;
            if (y < requiredYears - 1) m *= (1 + step);
        }

        if (!failed) {
            successes++;
            simResults.push({ returnIndices: indices, pathEndCorpus: path, failedAt: null });
        } else {
            simResults.push({ returnIndices: indices, pathEndCorpus: path, failedAt: failedAge });
        }
    }

    const successRate = ((successes / runs) * 100).toFixed(1);

    // Store globally for samples slider and sample button
    lastSimPaths = simResults;
    lastFailIndices = simResults.map((r, idx) => ({ idx, failedAt: r.failedAt })).filter(r => r.failedAt !== null).map(r => r.idx);
    lastFailShown.clear();
    lastLabels = Array.from({ length: requiredYears }, (_, i) => age0 + i);

    document.getElementById('mcTotal').textContent = runs;
    document.getElementById('mcPassed').textContent = successes;
    document.getElementById('mcFailed').textContent = runs - successes;
    const rateCell = document.getElementById('mcRate');
    rateCell.textContent = successRate + '%';
    rateCell.style.color = parseFloat(successRate) >= 95 ? '#16a34a' : '#dc2626';
    rateCell.style.fontWeight = 'bold';
    document.getElementById('mcResultsTable').style.display = 'table';

    // Draw initial chart with default samples (100)
    const totalDisplayPaths = parseInt(document.getElementById('samplesSlider').value, 10);
    let successPaths = simResults.filter(r => r.failedAt === null).map(r => r.pathEndCorpus);
    let failPaths = simResults.filter(r => r.failedAt !== null).map(r => r.pathEndCorpus);

    let successCount = Math.min(successPaths.length, Math.round(totalDisplayPaths * successes / runs));
    let failCount = Math.min(failPaths.length, totalDisplayPaths - successCount);
    if (successCount + failCount < totalDisplayPaths) {
        successCount = Math.min(successPaths.length, totalDisplayPaths);
        failCount = Math.min(failPaths.length, totalDisplayPaths - successCount);
    }

    function samplePaths(arr, k) {
        if (k >= arr.length) return arr.slice();
        const shuffled = [...arr];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, k);
    }

    const sampledSuccess = samplePaths(successPaths, successCount);
    const sampledFail = samplePaths(failPaths, failCount);

    let datasets = [];
    sampledSuccess.forEach(path => {
        datasets.push({ data: path, borderColor: 'rgba(43,124,255,0.25)', borderWidth: 1.2, pointRadius: 0, tension: 0.2 });
    });
    sampledFail.forEach(path => {
        datasets.push({ data: path, borderColor: 'rgba(220,38,38,0.25)', borderWidth: 1.2, pointRadius: 0, tension: 0.2 });
    });

    const labels = lastLabels;
    if (mcChart) mcChart.destroy();

    const maxY = corpus0 * 10;
    const minY = -corpus0 * 10;

    try {
        mcChart = new Chart(document.getElementById('mcChart'), {
            type: 'line',
            data: { labels, datasets },
            options: {
                plugins: { 
                    legend: { display: false },
                    tooltip: { enabled: false } // Disable tooltips for SORR chart
                },
                scales: {
                    y: {
                        min: minY,
                        max: maxY,
                        grid: { color: context => context.tick.value === 0 ? '#ccc' : '#e5e7eb' },
                        ticks: { callback: v => formatIndian(v) }
                    }
                }
            }
        });
        document.getElementById('mcChart').style.display = 'block';
        // Show the samples container now that we have a chart
        document.querySelector('.samplesContainer').style.display = 'flex';
    } catch (e) {
        console.error('Error creating initial chart:', e);
    }
    
    document.getElementById('mcLoader').style.display = 'none';

    const runBtn = document.getElementById('runMc');
    runBtn.innerText = 'Run simulations';
    runBtn.disabled = false;
    document.getElementById('niftyStatus').style.display = 'inline';

    if (lastFailIndices.length > 0) {
        const sampleBtn = document.getElementById('sampleFailBtn');
        sampleBtn.style.display = 'inline-block';
        sampleBtn.innerText = 'Show a sample failing sequence';
    }
}

// Sample failing sequence button
document.getElementById('sampleFailBtn').addEventListener('click', () => {
    if (lastFailIndices.length === 0) return;

    let available = [];
    for (let i = 0; i < lastFailIndices.length; i++) {
        if (!lastFailShown.has(lastFailIndices[i])) available.push(lastFailIndices[i]);
    }
    if (available.length === 0) {
        lastFailShown.clear();
        available = lastFailIndices.slice();
    }

    const chosenIdx = available[Math.floor(Math.random() * available.length)];
    lastFailShown.add(chosenIdx);

    const sim = lastSimPaths[chosenIdx];
    const indices = sim.returnIndices;
    const path = sim.pathEndCorpus;

    const age0 = parseInt(document.getElementById('currentAgeSlider').value, 10);
    const corpus0 = parseFloat(document.getElementById('corpusSlider').value);
    const monthly0 = parseFloat(document.getElementById('monthlySlider').value);
    const step = parseFloat(document.getElementById('stepupSlider').value) / 100 || 0;
    const requiredYears = path.length;

    let startCorpus = corpus0;
    let m = monthly0;
    let rows = [];
    let depletedFlag = false;

    for (let y = 0; y < requiredYears; y++) {
        const age = age0 + y;
        const idx = indices[y];
        const hist = niftyReturns[idx];
        const startDate = hist.startDate;
        const endDate = hist.endDate;
        const ret = hist.ret;
        const afterReturn = startCorpus * (1 + ret);
        const withdrawal = m * 12;
        const finalCorpus = path[y];

        if (finalCorpus <= 0) depletedFlag = true;

        rows.push({
            age,
            startDate: formatDate(startDate),
            endDate: formatDate(endDate),
            ret: (ret * 100).toFixed(2) + '%',
            startCorpus,
            afterReturn,
            withdrew: withdrawal,
            finalCorpus,
            depleted: depletedFlag
        });

        startCorpus = finalCorpus;
        if (y < requiredYears - 1) m *= (1 + step);
    }

    let html = '<table id="sampleTable"><thead><tr><th>Age</th><th>Fund Start Date</th><th>Fund End Date</th><th>Return %</th><th>Starting Corpus</th><th>After Return</th><th>Withdrew</th><th>Final Corpus</th></tr></thead><tbody>';
    rows.forEach(r => {
        // Determine row class if depleted
        const rowClass = r.depleted ? 'depleted-row' : '';
        // Determine cell classes for negative numbers
        const retClass = r.ret.includes('-') ? 'negative' : '';
        const startClass = r.startCorpus < 0 ? 'negative' : '';
        const afterClass = r.afterReturn < 0 ? 'negative' : '';
        const withdrewClass = ''; // always positive, no red
        const finalClass = r.finalCorpus < 0 ? 'negative' : '';

        html += `<tr class="${rowClass}">
            <td>${r.age}</td>
            <td>${r.startDate}</td>
            <td>${r.endDate}</td>
            <td class="${retClass}">${r.ret}</td>
            <td class="${startClass}">₹ ${formatIndian(r.startCorpus)}</td>
            <td class="${afterClass}">₹ ${formatIndian(r.afterReturn)}</td>
            <td class="${withdrewClass}">₹ ${formatIndian(r.withdrew)}</td>
            <td class="${finalClass}">₹ ${formatIndian(r.finalCorpus)}</td>
        </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('sampleTableContainer').innerHTML = html;

    const sampleBtn = document.getElementById('sampleFailBtn');
    sampleBtn.innerText = 'Show another sample failing sequence';
});

// ==================== TABS ====================
document.querySelectorAll('.tabBtn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tabContent').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
    });
});

// ==================== INITIAL CALL ====================
updateAll(); // draws static chart and sets hints
</script>
